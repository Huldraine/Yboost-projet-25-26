<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Steam Completion Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="container">
    <h1>Steam Completion Tracker</h1>
    <p class="sub">Saisis un pseudo (ou SteamID64) pour voir la completion des achievements</p>

    <form id="steamForm" class="steamForm">
      <input id="steamId" type="text" placeholder="Pseudo ou SteamID64 (17 chiffres)" autocomplete="off" list="userSuggestions" />
      <datalist id="userSuggestions"></datalist>
      <button id="loadGames" type="submit">Charger mes jeux</button>
    </form>

    <div id="errorBox" class="errorBox hidden"></div>

    <div id="gamesControls" class="controls">
      <input id="gameQ" type="search" placeholder="Rechercher un jeu..." autocomplete="off" />
      <select id="gameSort">
        <option value="completion_desc">Completion ↓</option>
        <option value="completion_asc">Completion ↑</option>
        <option value="name_asc">Nom A→Z</option>
        <option value="name_desc">Nom Z→A</option>
      </select>
      <button id="refreshGames" type="button">Rafraîchir</button>
    </div>

    <div id="achievementControls" class="controls hidden">
      <input id="achQ" type="search" placeholder="Rechercher un achievement..." autocomplete="off" />
      <select id="achSort">
        <option value="unlock_desc">Unlocked d'abord</option>
        <option value="pct_desc">% global ↓</option>
        <option value="pct_asc">% global ↑</option>
        <option value="name_asc">Nom A→Z</option>
      </select>
      <label class="check">
        <input id="showLocked" type="checkbox" checked />
        afficher verrouilles
      </label>
      <button id="backToGames" type="button">Retour aux jeux</button>
    </div>

    <div class="meta">
      <span id="status">Chargement…</span>
      <span id="count"></span>
    </div>
  </header>

  <main class="container">
    <div id="gamesGrid" class="grid"></div>
    <div id="achievementsGrid" class="grid hidden"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
